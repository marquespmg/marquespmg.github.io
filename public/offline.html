<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - PMG Atacadista</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(135deg, #095400 0%, #0a6e00 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 400px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px 30px;
            backdrop-filter: blur(10px);
        }
        
        img {
            width: 120px;
            margin-bottom: 25px;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 15px;
        }
        
        p {
            font-size: 16px;
            margin-bottom: 25px;
            opacity: 0.9;
            line-height: 1.5;
        }
        
        button {
            background-color: white;
            color: #095400;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .info {
            margin-top: 25px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/logo.png" alt="PMG Atacadista">
        <h1>📱 Você está offline</h1>
        <p>Conecte-se à internet para acessar o catálogo completo, ver ofertas e fazer seus pedidos.</p>
        <button onclick="location.reload()">🔄 Tentar novamente</button>
        <p class="info">Assim que reconectar, tudo voltará ao normal!</p>
    </div>
</body>
</html>
